<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#070A0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ghost Builder">
<title>Ghost Builder v6.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --void:#070A0F;--base:#0C1018;--surf:#131920;--over:#1C2430;--lift:#252F3D;
  --b1:rgba(255,255,255,.03);--b2:rgba(255,255,255,.07);--b3:rgba(255,255,255,.13);--b4:rgba(255,255,255,.22);
  --t1:#EDF2F7;--t2:#8896A8;--t3:#4A5568;--t4:#2D3748;
  --cy:#38BDF8;--cy-d:#0369A1;--cy-bg:rgba(56,189,248,.07);--cy-bdr:rgba(56,189,248,.22);
  --gr:#4ADE80;--gr-d:#16A34A;--gr-bg:rgba(74,222,128,.07);--gr-bdr:rgba(74,222,128,.22);
  --am:#FCD34D;--am-d:#B45309;--am-bg:rgba(252,211,77,.07);--am-bdr:rgba(252,211,77,.22);
  --rd:#F87171;--rd-bg:rgba(248,113,113,.07);--rd-bdr:rgba(248,113,113,.22);
  --pu:#C084FC;--pu-bg:rgba(192,132,252,.07);--pu-bdr:rgba(192,132,252,.22);
  --pk:#F472B6;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--void);color:var(--t1);font-family:var(--mono);overflow:hidden;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(56,189,248,.007) 3px,rgba(56,189,248,.007) 4px);pointer-events:none;z-index:9999;}

/* ═══ HEADER ═══ */
.hdr{flex-shrink:0;height:46px;background:var(--base);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 14px;gap:12px;position:relative;z-index:100;}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cy-bdr) 30%,var(--cy-bdr) 70%,transparent);}
.brand{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid var(--b2);}
.brand-ico{width:28px;height:28px;background:linear-gradient(135deg,var(--cy-d),var(--cy));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 18px rgba(56,189,248,.3);}
.brand-txt .brand-name{font-family:var(--sans);font-size:13px;font-weight:800;color:var(--t1);line-height:1;}
.brand-txt .brand-sub{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.hdr-pills{display:flex;gap:5px;align-items:center;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:9px;font-family:var(--mono);font-weight:600;border:1px solid transparent;letter-spacing:.3px;white-space:nowrap;}
.pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pill.cy{background:var(--cy-bg);border-color:var(--cy-bdr);color:var(--cy);}
.pill.cy .pill-dot{background:var(--cy);box-shadow:0 0 5px var(--cy);}
.pill.gr{background:var(--gr-bg);border-color:var(--gr-bdr);color:var(--gr);}
.pill.gr .pill-dot{background:var(--gr);box-shadow:0 0 5px var(--gr);animation:pdot 2s ease-in-out infinite;}
.pill.am{background:var(--am-bg);border-color:var(--am-bdr);color:var(--am);}
.pill.am .pill-dot{background:var(--am);}
.pill.pu{background:var(--pu-bg);border-color:var(--pu-bdr);color:var(--pu);}
.pill.pu .pill-dot{background:var(--pu);animation:pdot .8s ease-in-out infinite;}
.pill.rd{background:var(--rd-bg);border-color:var(--rd-bdr);color:var(--rd);}
.pill.nu{background:var(--b1);border-color:var(--b2);color:var(--t3);}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.hbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;font-size:10px;font-family:var(--mono);font-weight:500;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t2);transition:all .12s;white-space:nowrap;}
.hbtn:hover{background:var(--surf);color:var(--t1);border-color:var(--b3);}
.hbtn.cy{background:var(--cy-bg);border-color:var(--cy-bdr);color:var(--cy);}
.hbtn.cy:hover{background:rgba(56,189,248,.14);}
#btn-install{display:none;}
#btn-install.show{display:flex;}
kbd{background:var(--lift);border:1px solid var(--b3);border-radius:3px;padding:1px 5px;font-size:8px;font-family:var(--mono);color:var(--t3);}

/* ═══ WORKSPACE ═══ */
.ws{flex:1;display:grid;grid-template-columns:1fr 340px;min-height:0;overflow:hidden;}
@media(max-width:660px){.ws{grid-template-columns:1fr;}.rpanel{display:none;}}

/* ═══ LEFT ═══ */
.lpanel{display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* ── AI MODE SELECTOR ── */
.mode-bar{flex-shrink:0;background:var(--base);border-bottom:1px solid var(--b2);padding:10px 14px;}
.mode-bar-label{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.mode-bar-label .lock-notice{display:none;align-items:center;gap:5px;padding:2px 8px;background:var(--am-bg);border:1px solid var(--am-bdr);border-radius:20px;font-size:9px;color:var(--am);font-weight:600;}
.mode-bar-label .lock-notice.show{display:flex;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.mode-card{
  position:relative;
  padding:10px 12px;
  background:var(--surf);
  border:1px solid var(--b2);
  border-radius:10px;
  cursor:pointer;
  transition:all .15s;
  user-select:none;
}
.mode-card:hover{border-color:var(--b3);}
.mode-card.selected.local{background:rgba(56,189,248,.06);border-color:var(--cy-bdr);box-shadow:0 0 0 1px var(--cy-bdr);}
.mode-card.selected.cloud{background:rgba(252,211,77,.06);border-color:var(--am-bdr);box-shadow:0 0 0 1px var(--am-bdr);}
.mode-card.locked{cursor:not-allowed;opacity:.7;}
.mode-card.locked.selected{opacity:1;}

.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.mc-icon{font-size:16px;}
.mc-badge{font-size:8px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;letter-spacing:.5px;}
.mode-card.local .mc-badge{background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr-bdr);}
.mode-card.cloud .mc-badge{background:var(--am-bg);color:var(--am);border:1px solid var(--am-bdr);}

.mc-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px;}
.mc-desc{font-size:9px;color:var(--t3);font-family:var(--mono);line-height:1.4;}
.mode-card.selected.local .mc-name{color:var(--cy);}
.mode-card.selected.cloud .mc-name{color:var(--am);}

/* Sub-options inside local card */
.mc-subopts{margin-top:8px;display:none;flex-direction:column;gap:4px;}
.mode-card.selected .mc-subopts{display:flex;}
.mc-subopt{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;background:var(--void);
  border:1px solid var(--b2);border-radius:6px;
  cursor:pointer;transition:all .1s;
}
.mc-subopt:hover{border-color:var(--b3);}
.mc-subopt.active{border-color:var(--cy-bdr);background:var(--cy-bg);}
.mc-subopt-name{font-size:10px;color:var(--t2);font-family:var(--mono);}
.mc-subopt.active .mc-subopt-name{color:var(--cy);}
.mc-subopt-speed{font-size:8px;color:var(--t3);font-family:var(--mono);}
.mc-subopt.active .mc-subopt-speed{color:var(--am);}

/* Cloud API key input */
.mc-apikey{margin-top:8px;display:none;}
.mode-card.selected.cloud .mc-apikey{display:block;}
.apikey-inp{
  width:100%;background:var(--void);border:1px solid var(--b2);
  border-radius:6px;padding:6px 10px;
  font-family:var(--mono);font-size:10px;color:var(--t1);
  outline:none;transition:border-color .1s;
}
.apikey-inp:focus{border-color:var(--am-bdr);}
.apikey-inp::placeholder{color:var(--t4);}

/* Lock overlay on non-selected card during build */
.mode-card .lock-overlay{
  position:absolute;inset:0;border-radius:10px;
  background:rgba(7,10,15,.75);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:5px;
  backdrop-filter:blur(2px);
}
.mode-card .lock-overlay.show{display:flex;}
.lock-ico{font-size:22px;}
.lock-txt{font-size:9px;color:var(--am);font-family:var(--mono);font-weight:600;}

/* ── PROMPT ── */
.prompt-sec{flex-shrink:0;background:var(--base);border-bottom:1px solid var(--b2);padding:12px 14px;}
.ps-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ps-label{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}
.speed-toggle{display:flex;background:var(--void);border:1px solid var(--b2);border-radius:5px;overflow:hidden;}
.stog-opt{padding:3px 10px;font-size:9px;font-family:var(--mono);font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .12s;letter-spacing:.3px;}
.stog-opt.active.fast{background:var(--am-bg);color:var(--am);}
.stog-opt.active.quality{background:var(--cy-bg);color:var(--cy);}
.prompt-row{display:flex;gap:8px;align-items:flex-end;}
.prompt-ta{
  flex:1;min-height:42px;max-height:100px;
  background:var(--void);border:1px solid var(--b2);border-radius:8px;
  padding:10px 12px;color:var(--t1);font-family:var(--mono);font-size:12px;
  resize:none;outline:none;line-height:1.6;transition:border-color .15s,box-shadow .15s;
}
.prompt-ta:focus{border-color:var(--cy-bdr);box-shadow:0 0 0 3px rgba(56,189,248,.07);}
.prompt-ta::placeholder{color:var(--t4);}
.build-btn{
  flex-shrink:0;height:42px;padding:0 18px;
  background:linear-gradient(135deg,var(--cy-d),var(--cy));
  border:none;border-radius:8px;color:#070A0F;
  font-family:var(--sans);font-size:12px;font-weight:800;
  cursor:pointer;letter-spacing:.5px;transition:all .15s;white-space:nowrap;
  box-shadow:0 4px 16px rgba(56,189,248,.25);
}
.build-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(56,189,248,.4);}
.build-btn:active{transform:translateY(0);}
.build-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* STAGE BAR */
.stage-bar{flex-shrink:0;display:flex;align-items:center;gap:0;padding:7px 14px;background:var(--base);border-bottom:1px solid var(--b1);overflow-x:auto;}
.stage-bar::-webkit-scrollbar{display:none;}
.stage-item{display:flex;align-items:center;}
.snode{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:9px;font-family:var(--mono);font-weight:600;color:var(--t4);border:1px solid transparent;transition:all .2s;letter-spacing:.3px;white-space:nowrap;}
.snode.done{color:var(--gr);background:var(--gr-bg);border-color:var(--gr-bdr);}
.snode.active{color:var(--cy);background:var(--cy-bg);border-color:var(--cy-bdr);animation:sna .8s ease-in-out infinite;}
@keyframes sna{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.3)}50%{box-shadow:0 0 0 4px rgba(56,189,248,.07)}}
.sarrow{color:var(--t4);font-size:9px;padding:0 4px;}

/* TABS */
.tab-bar{flex-shrink:0;display:flex;background:var(--base);border-bottom:1px solid var(--b2);padding:0 14px;}
.tab{display:flex;align-items:center;gap:5px;padding:8px 12px 7px;font-size:10px;font-family:var(--mono);color:var(--t3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px;white-space:nowrap;}
.tab:hover{color:var(--t2);}
.tab.active{color:var(--t1);border-bottom-color:var(--cy);}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--t4);}
.tab.active .tdot{background:var(--cy);box-shadow:0 0 5px var(--cy);}

/* PANES */
.panes{flex:1;position:relative;min-height:0;overflow:hidden;}
.pane{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.pane.active{display:flex;}

/* STREAM */
.stream{flex:1;overflow-y:auto;padding:12px 14px;font-size:11px;line-height:1.9;}
.stream::-webkit-scrollbar{width:3px;}
.stream::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px;}
.aline{display:grid;grid-template-columns:52px 56px 1fr;gap:5px;padding:0;animation:alin .15s ease;}
@keyframes alin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.al-ts{font-size:9px;color:var(--t4);padding-top:1px;}
.al-tag{font-size:9px;font-weight:600;padding-top:1px;letter-spacing:.3px;}
.al-msg{color:var(--t2);word-break:break-word;}
.aline.sys .al-tag{color:var(--t4);}.aline.sys .al-msg{color:var(--t3);}
.aline.think .al-tag{color:var(--pu);}.aline.think .al-msg{color:rgba(192,132,252,.85);font-style:italic;}
.aline.spec .al-tag{color:var(--am);}.aline.spec .al-msg{color:rgba(252,211,77,.8);}
.aline.code .al-tag{color:var(--cy-d);}.aline.code .al-msg{color:var(--cy);font-size:10.5px;}
.aline.ok .al-tag{color:var(--gr);}.aline.ok .al-msg{color:rgba(74,222,128,.75);}
.aline.err .al-tag{color:var(--rd);}.aline.err .al-msg{color:rgba(248,113,113,.8);}
.aline.head .al-tag{color:var(--pk);}.aline.head .al-msg{color:var(--t1);font-weight:600;}
.aline.data .al-tag{color:var(--t2);}.aline.data .al-msg{color:var(--t1);}
.aline.lock .al-tag{color:var(--am);}.aline.lock .al-msg{color:var(--am);}
.scur{display:inline-block;width:6px;height:12px;background:var(--cy);vertical-align:text-bottom;margin-left:2px;animation:scblink .9s step-end infinite;}
@keyframes scblink{0%,100%{opacity:1}50%{opacity:0}}

/* PREVIEW */
.preview-wrap{flex:1;display:flex;flex-direction:column;min-height:0;}
.preview-topbar{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--base);border-bottom:1px solid var(--b2);}
.preview-url{flex:1;background:var(--void);border:1px solid var(--b2);border-radius:5px;padding:5px 10px;font-size:10px;color:var(--t3);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.preview-fw{flex:1;position:relative;min-height:0;}
.preview-frame{width:100%;height:100%;border:none;background:#fff;}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;}
.pei{font-size:40px;opacity:.2;}
.pet{font-size:11px;color:var(--t4);text-align:center;line-height:1.7;}
.preview-loading{position:absolute;inset:0;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spin{width:30px;height:30px;border:2px solid var(--b2);border-top-color:var(--cy);border-radius:50%;animation:spinning .7s linear infinite;}
@keyframes spinning{to{transform:rotate(360deg)}}
.spin-txt{font-size:10px;color:var(--t3);}

/* SAVED APPS */
.apps-list{flex:1;overflow-y:auto;padding:10px;}
.apps-list::-webkit-scrollbar{width:3px;}
.apps-list::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px;}
.app-card{background:var(--surf);border:1px solid var(--b2);border-radius:8px;padding:11px;margin-bottom:7px;transition:border-color .12s;}
.app-card:hover{border-color:var(--b3);}
.acard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.acard-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--t1);}
.acard-ts{font-size:9px;color:var(--t4);font-family:var(--mono);}
.acard-desc{font-size:10px;color:var(--t3);line-height:1.5;margin-bottom:7px;}
.acard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.atag{padding:2px 6px;background:var(--b1);border:1px solid var(--b2);border-radius:3px;font-size:8px;color:var(--t3);font-family:var(--mono);}
.acard-btns{display:flex;gap:5px;}
.acbtn{flex:1;padding:5px;background:transparent;border:1px solid var(--b2);border-radius:5px;color:var(--t3);font-size:10px;font-family:var(--mono);cursor:pointer;transition:all .1s;text-align:center;}
.acbtn:hover{color:var(--t1);border-color:var(--b3);}
.acbtn.dl{color:var(--cy);border-color:var(--cy-bdr);}
.acbtn.dl:hover{background:var(--cy-bg);}
.acbtn.del{color:var(--rd);}
.acbtn.del:hover{background:var(--rd-bg);border-color:var(--rd-bdr);}
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;}
.esi{font-size:32px;opacity:.2;}
.est{font-size:11px;color:var(--t4);text-align:center;line-height:1.7;}

/* ═══ RIGHT PANEL ═══ */
.rpanel{background:var(--base);border-left:1px solid var(--b2);display:flex;flex-direction:column;overflow:hidden;}
.rp-sec{padding:12px 13px;border-bottom:1px solid var(--b1);}
.rp-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px;}

/* Ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 13px;border-bottom:1px solid var(--b1);}
.ring-svg{width:68px;height:68px;}
.ring-bg{fill:none;stroke:var(--b2);stroke-width:5;}
.ring-fill{fill:none;stroke:var(--cy);stroke-width:5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .4s ease;}
.ring-pct{font-family:var(--sans);font-weight:800;font-size:13px;fill:var(--t1);}
.ring-sub{font-family:var(--mono);font-size:7px;fill:var(--t4);}

/* Stats */
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 13px;border-bottom:1px solid var(--b1);}
.sbox{background:var(--surf);border:1px solid var(--b2);border-radius:6px;padding:8px;text-align:center;}
.sval{font-family:var(--sans);font-size:18px;font-weight:800;line-height:1;margin-bottom:2px;}
.sval.cy{color:var(--cy);}.sval.gr{color:var(--gr);}.sval.am{color:var(--am);}.sval.pu{color:var(--pu);}
.slbl{font-size:8px;color:var(--t4);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;}

/* Spec */
.spec-scroll{flex:1;overflow-y:auto;}
.spec-scroll::-webkit-scrollbar{width:3px;}
.spec-scroll::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px;}
.spec-blk{padding:10px 13px;border-bottom:1px solid var(--b1);}
.spec-blk-lbl{font-size:8px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;font-family:var(--mono);}
.spec-blk-val{font-size:12px;color:var(--t1);font-family:var(--sans);font-weight:600;line-height:1.4;}
.spec-blk-val.mono{font-family:var(--mono);font-weight:400;font-size:10px;color:var(--t2);}
.feat-list{display:flex;flex-direction:column;gap:3px;}
.feat-item{font-size:10px;color:var(--t2);font-family:var(--mono);display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.feat-item::before{content:'▸';color:var(--cy);flex-shrink:0;margin-top:1px;}

/* Device */
.dev-rows{padding:10px 13px;}
.dev-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--b1);}
.dev-row:last-child{border-bottom:none;}
.dev-k{font-size:9px;color:var(--t4);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;}
.dev-v{font-size:10px;color:var(--cy);font-family:var(--mono);font-weight:500;}
.dev-v.gr{color:var(--gr);}.dev-v.am{color:var(--am);}.dev-v.nu{color:var(--t2);}

/* ═══ STATUS BAR ═══ */
.sbar{flex-shrink:0;height:22px;background:var(--cy-d);display:flex;align-items:center;padding:0 14px;gap:10px;font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.85);}
.sbar.idle{background:var(--over);border-top:1px solid var(--b2);}
.sbar.idle *{color:var(--t4);}
.sb-i{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sb-sp{flex:1;}
.sb-sep{width:1px;height:10px;background:rgba(255,255,255,.15);}
.sbar.idle .sb-sep{background:var(--b2);}

/* ═══ CMD PALETTE ═══ */
.cp-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:900;display:none;align-items:flex-start;justify-content:center;padding-top:65px;}
.cp-bg.open{display:flex;}
